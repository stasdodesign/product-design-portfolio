name: SAFE MONOREPO DEPLOY (FIXED)

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # =========================
      # INSTALL ROOT
      # =========================
      - name: Install root deps
        run: npm ci

      # =========================
      # BUILD CART
      # =========================
      - name: Build Cart
        run: |
          cd apps/cart
          npm ci
          npm run build

      # =========================
      # BUILD GARAGE
      # =========================
      - name: Build Garage
        run: |
          cd apps/garage
          npm ci
          npm run build

      # =========================
      # SAFE DEPLOY PREP
      # =========================
      - name: Prepare site
        run: |
          rm -rf _site
          mkdir -p _site

          # 🔥 COPY ROOT AS-IS (ЭТО ГЛАВНОЕ ИСПРАВЛЕНИЕ)
          rsync -av \
            --exclude node_modules \
            --exclude apps \
            ./ _site/

          # 🔥 CART
          mkdir -p _site/cart
          cp -r apps/cart/dist/* _site/cart/

          # 🔥 GARAGE
          mkdir -p _site/garage
          cp -r apps/garage/dist/* _site/garage/

      # =========================
      # DEPLOY
      # =========================
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4