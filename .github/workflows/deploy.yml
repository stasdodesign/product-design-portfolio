name: LEVEL 3 PRO MONOREPO DEPLOY

on:
  push:
    branches: [main, dev]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

# =========================
# BUILD ALL APPS (MATRIX)
# =========================
jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        app: ["cart", "garage"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        working-directory: apps/${{ matrix.app }}
        run: npm ci

      - name: Build app
        working-directory: apps/${{ matrix.app }}
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}
          path: apps/${{ matrix.app }}/dist

# =========================
# DEPLOY TO GITHUB PAGES
# =========================
  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all builds
        uses: actions/download-artifact@v4
        with:
          path: builds

      - name: Prepare site
        run: |
          rm -rf _site
          mkdir -p _site

          # optional static root site
          if [ -d "public" ]; then
            cp -r public/* _site/
          fi

          # map builds → routes
          for dir in builds/*; do
            name=$(basename "$dir")
            mkdir -p "_site/$name"
            cp -r "$dir/"* "_site/$name/"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4