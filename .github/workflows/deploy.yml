name: Deploy full site with cart

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Build Vite app (cart)
      - name: Build cart
        working-directory: cart
        run: |
          npm ci
          npm run build

      # Prepare deploy folder
      - name: Prepare site
        run: |
          rm -rf _site
          mkdir _site

          # Copy ONLY safe root files/folders
          rsync -av \
            --exclude="cart" \
            --exclude=".github" \
            --exclude="node_modules" \
            --exclude="cart/node_modules" \
            ./ _site/

          # Ensure cart is built into /cart
          mkdir -p _site/cart
          cp -r cart/dist/* _site/cart/

      # Upload to Pages
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        uses: actions/deploy-pages@v4