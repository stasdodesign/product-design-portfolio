name: MONOREPO SAFE BUILD (DEBUG + FIXED)

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root deps
        run: npm ci

      # =========================
      # CART BUILD (WITH DEBUG)
      # =========================
      - name: Build Cart
        run: |
          cd apps/cart
          npm ci
          npm run build
          echo "=== CART DIST CHECK ==="
          ls -la dist || echo "NO DIST FOLDER!"

      # =========================
      # GARAGE BUILD
      # =========================
      - name: Build Garage
        run: |
          cd apps/garage
          npm ci
          npm run build
          echo "=== GARAGE DIST CHECK ==="
          ls -la dist || echo "NO DIST FOLDER!"

      # =========================
      # PREPARE DEPLOY
      # =========================
      - name: Prepare site
        run: |
          rm -rf _site
          mkdir -p _site

          # ROOT SITE
          rsync -av --exclude node_modules ./ _site/

          # CART SAFE COPY
          if [ -d "apps/cart/dist" ]; then
            mkdir -p _site/apps/cart
            cp -r apps/cart/dist/* _site/apps/cart/
          else
            echo "❌ CART DIST NOT FOUND"
          fi

          # GARAGE SAFE COPY
          if [ -d "apps/garage/dist" ]; then
            mkdir -p _site/apps/garage
            cp -r apps/garage/dist/* _site/apps/garage/
          else
            echo "❌ GARAGE DIST NOT FOUND"
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/deploy-pages@v4