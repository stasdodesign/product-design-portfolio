name: SMART MONOREPO (SELECTIVE BUILD)

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:

  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # =========================
      # BUILD CART
      # =========================
      - name: Build Cart
        run: |
          cd apps/cart
          npm ci
          npm run build

      # =========================
      # BUILD GARAGE
      # =========================
      - name: Build Garage
        run: |
          cd apps/garage
          npm ci
          npm run build

      # =========================
      # BUILD SITE (FINAL OUTPUT)
      # =========================
      - name: Prepare site
        run: |
          rm -rf _site
          mkdir -p _site

          # root files
          rsync -av --exclude apps ./ _site/

          # CART (FULL DIST INCLUDING CSS)
          mkdir -p _site/apps/cart
          cp -r apps/cart/dist/* _site/apps/cart/

          # GARAGE (FULL DIST INCLUDING CSS)
          mkdir -p _site/apps/garage
          cp -r apps/garage/dist/* _site/apps/garage/

      # =========================
      # PAGES DEPLOY
      # =========================
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy-pages:
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/deploy-pages@v4