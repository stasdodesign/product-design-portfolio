name: PRO MONOREPO BUILD + SAFE DEPLOY

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # =========================
      # INSTALL ROOT (IMPORTANT)
      # =========================
      - name: Install root deps
        run: npm ci

      # =========================
      # BUILD CART
      # =========================
      - name: Build Cart
        run: |
          cd apps/cart
          npm ci
          npm run build

      # =========================
      # BUILD GARAGE
      # =========================
      - name: Build Garage
        run: |
          cd apps/garage
          npm ci
          npm run build

      # =========================
      # PREPARE FINAL SITE
      # =========================
      - name: Prepare deploy folder
        run: |
          rm -rf _site
          mkdir -p _site

          # 🔥 ROOT SITE (ВАЖНО: НЕ ТРОГАЕМ ТВОЙ САЙТ)
          cp -r ./index.html _site/
          [ -d "./assets" ] && cp -r ./assets _site/ || true
          [ -d "./css" ] && cp -r ./css _site/ || true
          [ -d "./js" ] && cp -r ./js _site/ || true

          # 🔥 CART APP
          mkdir -p _site/cart
          cp -r apps/cart/dist/* _site/cart/

          # 🔥 GARAGE APP
          mkdir -p _site/garage
          cp -r apps/garage/dist/* _site/garage/

      # =========================
      # PAGES ARTIFACT
      # =========================
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4