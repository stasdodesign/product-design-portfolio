name: SMART MONOREPO (SELECTIVE BUILD)

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
# =========================
# DETECT CHANGES
# =========================
  changes:
    runs-on: ubuntu-latest
    outputs:
      cart: ${{ steps.filter.outputs.cart }}
      garage: ${{ steps.filter.outputs.garage }}
      root: ${{ steps.filter.outputs.root }}

    steps:
      - uses: actions/checkout@v4

      - name: Detect changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            cart:
              - 'apps/cart/**'
            garage:
              - 'apps/garage/**'
            root:
              - 'index.html'
              - 'en.html'
              - 'assets/**'
              - 'css/**'
              - 'js/**'
              - 'package.json'
              - 'package-lock.json'

# =========================
# BUILD CART
# =========================
  build-cart:
    needs: changes
    if: needs.changes.outputs.cart == 'true' || needs.changes.outputs.root == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build Cart
        run: |
          cd apps/cart
          npm ci
          npm run build

      - name: Upload Cart
        uses: actions/upload-artifact@v4
        with:
          name: cart
          path: apps/cart/dist

# =========================
# BUILD GARAGE
# =========================
  build-garage:
    needs: changes
    if: needs.changes.outputs.garage == 'true' || needs.changes.outputs.root == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build Garage
        run: |
          cd apps/garage
          npm ci
          npm run build

      - name: Upload Garage
        uses: actions/upload-artifact@v4
        with:
          name: garage
          path: apps/garage/dist

# =========================
# DEPLOY
# =========================
  deploy:
    needs: [build-cart, build-garage]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: builds

      - name: Prepare site
        run: |
          rm -rf _site
          mkdir -p _site

          # ROOT SITE
          rsync -av --exclude apps ./ _site/

          # CART
          if [ -d "builds/cart" ]; then
            mkdir -p _site/apps/cart
            cp -r builds/cart/* _site/apps/cart/
          fi

          # GARAGE
          if [ -d "builds/garage" ]; then
            mkdir -p _site/apps/garage
            cp -r builds/garage/* _site/apps/garage/
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

# =========================
# DEPLOY PAGES
# =========================
  deploy-pages:
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/deploy-pages@v4