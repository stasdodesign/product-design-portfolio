name: Deploy site with cart

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Build ONLY cart
      - name: Build cart
        working-directory: cart
        run: |
          npm ci
          npm run build

      # Prepare publish folder WITHOUT breaking root site
      - name: Prepare pages folder
        run: |
          rm -rf _site
          mkdir _site

          # root site 그대로
          cp index.html _site/
          cp en.html _site/
          cp 404.html _site/
          cp -r css _site/
          cp -r images _site/
          cp -r dark _site/
          cp -r video _site/ || true

          # cart ONLY injected as subfolder
          mkdir -p _site/cart
          cp -r cart/dist/* _site/cart/

          # keep other projects untouched
          cp -r ingosstrakh _site/ || true
          cp -r luma-brand _site/ || true
          cp -r luma-one _site/ || true
          cp -r racktables _site/ || true
          cp -r research _site/ || true
          cp -r sber-usersoft _site/ || true
          cp -r stylo-you _site/ || true
          cp -r type _site/ || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4