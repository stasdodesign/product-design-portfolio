name: LEVEL 3 PRO MONOREPO DEPLOY (SMART FIXED)

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
# =========================
# DETECT CHANGES
# =========================
  changes:
    runs-on: ubuntu-latest
    outputs:
      cart: ${{ steps.filter.outputs.cart }}
      garage: ${{ steps.filter.outputs.garage }}

    steps:
      - uses: actions/checkout@v4

      - name: Detect changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            cart:
              - 'apps/cart/**'
            garage:
              - 'apps/garage/**'
            root:
              - 'package.json'
              - 'package-lock.json'

# =========================
# BUILD (shared install)
# =========================
  build:
    needs: changes
    runs-on: ubuntu-latest

    outputs:
      cart_built: ${{ steps.flag.outputs.cart }}
      garage_built: ${{ steps.flag.outputs.garage }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root deps
        run: npm ci

      # ================= CART =================
      - name: Build Cart
        if: needs.changes.outputs.cart == 'true' || needs.changes.outputs.root == 'true'
        run: npm run build --workspace=cart || cd apps/cart && npm run build

      # ================= GARAGE =================
      - name: Build Garage
        if: needs.changes.outputs.garage == 'true' || needs.changes.outputs.root == 'true'
        run: npm run build --workspace=garage || cd apps/garage && npm run build

      - name: Mark built apps
        id: flag
        run: |
          echo "cart=true" >> $GITHUB_OUTPUT
          echo "garage=true" >> $GITHUB_OUTPUT

      - name: Upload Cart
        if: hashFiles('apps/cart/dist/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: cart
          path: apps/cart/dist

      - name: Upload Garage
        if: hashFiles('apps/garage/dist/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: garage
          path: apps/garage/dist

# =========================
# DEPLOY (ONLY IF BUILD OK)
# =========================
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: success() && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: builds

      - name: Prepare site
        run: |
          rm -rf _site
          mkdir -p _site

          if [ -d "builds/cart" ]; then
            mkdir -p _site/cart
            cp -r builds/cart/* _site/cart/
          fi

          if [ -d "builds/garage" ]; then
            mkdir -p _site/garage
            cp -r builds/garage/* _site/garage/
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        uses: actions/deploy-pages@v4