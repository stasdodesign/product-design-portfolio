name: MONOREPO DEPLOY (ROOT + APPS STRUCTURE)

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # =========================
      # ROOT INSTALL (for main site)
      # =========================
      - name: Install root deps
        run: npm ci

      # =========================
      # BUILD CART
      # =========================
      - name: Build Cart
        run: |
          cd apps/cart
          npm ci
          npm run build

      # =========================
      # BUILD GARAGE
      # =========================
      - name: Build Garage
        run: |
          cd apps/garage
          npm ci
          npm run build

      # =========================
      # BUILD SITE STRUCTURE
      # =========================
      - name: Prepare deploy
        run: |
          rm -rf _site
          mkdir -p _site

          # =========================
          # ROOT SITE (ВАЖНО: ТВОЙ САЙТ)
          # =========================
          cp -r ./*.html _site/ 2>/dev/null || true
          cp -r ./assets _site/ 2>/dev/null || true
          cp -r ./css _site/ 2>/dev/null || true
          cp -r ./js _site/ 2>/dev/null || true

          # =========================
          # APPS (СОХРАНЯЕМ /apps/* СТРУКТУРУ)
          # =========================
          mkdir -p _site/apps/cart
          mkdir -p _site/apps/garage

          cp -r apps/cart/dist/* _site/apps/cart/
          cp -r apps/garage/dist/* _site/apps/garage/

      # =========================
      # PAGES ARTIFACT
      # =========================
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4